<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LedScroller - Support & Privacy</title>
  <style>
    :root { --bg1:#0f172a; --bg2:#111827; --card:#ffffff; --text:#111827; --muted:#6b7280; --accent:#22c55e; }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 800px at 20% 10%, #1f2937 0%, var(--bg1) 45%, var(--bg2) 100%);
      color:#e5e7eb;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(860px, 100%);
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:18px;
      padding:28px;
      backdrop-filter: blur(10px);
    }
    h1{ margin:0 0 8px 0; font-size:28px; }
    p{ margin:0 0 14px 0; color:#cbd5e1; line-height:1.6; }
    .links{ display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    a.btn{
      display:inline-block;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.08);
      color:#e5e7eb;
      text-decoration:none;
      font-weight:600;
    }
    a.btn.primary{ border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.18); }
    .fine{ margin-top:18px; color:#94a3b8; font-size:13px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>LedScroller</h1>
    <p>Official support and privacy pages for the LedScroller iOS app.</p>

    <div class="links">
      <a class="btn primary" href="./support/">Technical Support</a>
      <a class="btn" href="./privacy/">Privacy Policy</a>
    </div>

    <p class="fine">If you are viewing this from App Store review, use the buttons above to open the required pages.</p>
  </main>
</body>
</html>
